<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>sideshow slideshow</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;overflow:hidden}
  #stage{position:fixed;inset:0;background:#000}
  #stage img{position:absolute;inset:0;width:100%;height:100%;opacity:0}
  #stage.fade img{transition:opacity .6s ease}
  #stage.contain img{object-fit:contain}
  #stage.cover img{object-fit:cover}
  #msg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
       color:#8a93a6;font:500 16px/1.4 system-ui,sans-serif}
</style>
</head>
<body>
<div id="stage" class="fade contain"><div id="msg">Loading slideshow…</div></div>
<script>
// A self-contained slideshow page. It reads its config from the URL query/hash
// (images=<base64 json>) or falls back to polling /api/slideshow on the agent.
// Two cross-fading <img> layers; the active image and interval come from config.
(function(){
  var stage=document.getElementById('stage');
  var msg=document.getElementById('msg');
  var a=document.createElement('img'),b=document.createElement('img');
  var cur=null,idx=0,timer=null,lastKey='';

  function apply(cfg){
    var images=(cfg.images||[]).filter(Boolean);
    var interval=Math.max(1000,(cfg.interval_s||cfg.interval||6)*(cfg.interval_s?1000:1));
    if(cfg.interval_s) interval=Math.max(1000,cfg.interval_s*1000);
    var fit=cfg.fit==='cover'?'cover':'contain';
    var tr=(cfg.transition==='none')?'none':'fade';
    var key=JSON.stringify([images,interval,fit,tr]);
    if(key===lastKey) return;            // no-op on identical config (idempotent)
    lastKey=key;
    if(timer){clearInterval(timer);timer=null;}
    stage.className=(tr==='fade'?'fade ':'')+fit;
    if(!images.length){msg.style.display='';return;}
    msg.style.display='none';
    if(!a.parentNode){stage.appendChild(a);stage.appendChild(b);}
    idx=0;cur=a;a.src=images[0];a.style.opacity='1';b.style.opacity='0';
    timer=setInterval(function(){
      idx=(idx+1)%images.length;
      var nxt=(cur===a)?b:a;
      nxt.src=images[idx];nxt.style.opacity='1';cur.style.opacity='0';cur=nxt;
    },interval);
  }

  // 1) Inline config via ?images=<base64(JSON of SlideshowInfo)>.
  try{
    var q=new URLSearchParams(location.search);
    var enc=q.get('config')||q.get('images');
    if(enc){apply(JSON.parse(decodeURIComponent(escape(atob(enc)))));return;}
  }catch(e){/* fall through to polling */}

  // 2) Poll the agent for the live slideshow config every 5s.
  function poll(){
    fetch('/api/slideshow',{credentials:'same-origin'})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(j){if(j)apply(j);})
      .catch(function(){});
  }
  poll();setInterval(poll,5000);
})();
</script>
</body>
</html>
